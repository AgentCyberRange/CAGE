# Self-declared entry in the `cage benchmark list` registry. The framework
# discovers this block; it hardcodes no benchmark names.
registration:
  id: nyu_ctf
  display_name: NYU CTF
  description: NYU CTF tasks served through Cage targets.
  order: 8
  samples:
    index: nyu_ctf.json

project:
  name: nyu-ctf-cage

subjects:
  - id: openai-example

proxy:
  enabled: true
  upstream_http_proxy: http://host.docker.internal:7890

output:
  dashboard_prompt: false
  dashboard_output: false
  dashboard_reasoning: false
  csv_prompt: false
  csv_output: false
  csv_reasoning: false

eval:
  benchmark:
    module: ./benchmark.py
    class: NYUCTF
    benchmark_root: ./datasets

runtime:
  timeout: 2000
  max_trials_global: 24
  max_rounds: 50
  agent_network_mode: bridge
  live_check:
    enabled: true
    max_calls: 50
    stop_on_success: true
    reactive:
      enabled: true
      check_on_submit: true
      check_on_9091_call: true
    polling:
      enabled: true
      interval_seconds: 50
      stop_on_success: true

agents:
  - id: claude_code_baseline
    kind: claude_code
    home: /home/agent/workspace
    session_args:
      - --permission-mode
      - bypassPermissions
      - --verbose
