# Self-declared entry in the `cage benchmark list` registry. The framework
# discovers this block; it hardcodes no benchmark names.
registration:
  id: cybergym
  display_name: CyberGym
  description: Official CyberGym vulnerability-reproduction benchmark (produce a crashing PoC).
  order: 5
  samples:
    index: cybergym.json

project:
  # Appears in run artifacts and the web inspector.
  name: cybergym

proxy:
  # Records every model request and writes per-trial token/cost progress.
  enabled: true
  request_timeout: 3600
  # The agent container reaches the model endpoint through the host HTTP proxy
  # on the docker host gateway (same route the grading service uses). Uncomment
  # and set if your models need it (e.g. OAuth/Anthropic via host mihomo).
  # upstream_http_proxy: http://172.17.0.1:7890

output:
  dashboard_prompt: false
  dashboard_output: false
  dashboard_reasoning: false
  csv_prompt: false
  csv_output: false
  csv_reasoning: false

logging:
  inspect_mode: auto

eval:
  benchmark:
    module: ./benchmark.py
    class: CyberGymBenchmark
    # Task catalog: the OFFICIAL CyberGym benchmark (1507 tasks = 1368 arvo +
    # 139 oss-fuzz), built from cybergym_data/tasks.json. Source of truth for
    # which tasks exist, like cvebench.json / nyu_ctf.json. Regenerate with
    # scripts/build_cybergym_index.py from-manifest.
    benchmark_root: ./datasets
    index_file: cybergym.json
    # All large, machine-specific data resolves through gitignored symlinks under
    # ./datasets/ (set them up once per machine, see datasets/README), so this
    # committed config stays generic. Relative paths are anchored at this example
    # dir, not the CWD.
    #
    #   ln -sfn /your/cybergym/data            datasets/payloads        # repo tarballs
    #   ln -sfn /your/cybergym-server-data     datasets/server-binary   # prebuilt binaries
    #   ln -sfn /your/cybergym/image-cache     datasets/image-cache     # (image mode only)
    #
    # Payloads staged into the agent container: each <data_dir>/<source>/<id>/
    # holds repo-vul.tar.gz, description.txt, error.txt, meta.json.
    data_dir: ./datasets/payloads
    # --- Grading backend: BINARY mode is the default -------------------------
    # binary_dir set -> grade against PREBUILT vul/fix binaries (~130 GB on disk)
    # executed by a small pre-pulled base runner (cybergym/oss-fuzz-base-runner).
    # Covers the FULL 1507-task catalog with no multi-TB image cache. Get the data:
    #   python scripts/server_data/download_binary_only_runners.py   # base runners
    #   wget .../cybergym-server-binary/.../cybergym-server-data.7z && 7z x ...
    binary_dir: ./datasets/server-binary
    # Custom subset (works in EITHER grading mode): restrict the run to a fixed
    # list of task ids — one per line, "arvo:1065" or just "1065". Omit = the full
    # 1507-task catalog. ./datasets/cybergym_images.txt is the official trace-100;
    # point this at your own file to run any subset (e.g. binary mode + 100 tasks).
    # task_ids: ./datasets/cybergym_images.txt
    # To use IMAGE mode instead (per-task n132/arvo:<id>-<mode> images), comment
    # out binary_dir above and uncomment these. image_cache_dir / image_cache are
    # IGNORED while binary_dir is set (task_ids applies in both modes).
    # image_cache_dir: ./datasets/image-cache
    # image_cache: { pinned_task_ids: ./datasets/cybergym_images.txt, max_evictable_gb: 100, evict: true, min_free_gb: 50, preload: true }
    # --- White-box debug mode (a.k.a. dynamic_sandbox) -----------------------
    # OFF by default = upstream's blind contract (source + a submit oracle only).
    # ON = stage the prebuilt vulnerable target into the agent (identity-
    # neutralised: /out/fuzzer + rewritten wrapper) AND run it in the debug image
    # (dynamic_sandbox_image, ABI-matched to the binary), so the agent reproduces
    # the crash LOCALLY before submitting. Needs binary_dir. Flipping this ONE
    # flag swaps both the workspace and the runtime image — no agents[].image edit.
    # Toggle per-run without editing yaml:
    #   cage run cybergym --dynamic-sandbox true
    #   cage run cybergym --set eval.benchmark.dynamic_sandbox=true
    # NOTE: this is the white-box variant, NOT blind official CyberGym — keep its
    # results on a separate curve. dynamic_sandbox_image overrides the debug image.
    dynamic_sandbox: false
    # dynamic_sandbox_image: cage/claude-code:cyberdebug
    # level0 repo only · level1 +description · level2 +crash trace · level3 +patch.
    difficulty: level1
    # Subset further from the CLI with `--sample arvo_10400 ...` or `eval.limit`.
    grading:
      # The interactive submit service that gives the agent `submit.sh` feedback
      # by running the vul target. It holds the docker socket; the agent does not.
      enabled: true
      # host: 172.17.0.1   # agent->service via docker host gateway (default)
      # port: 0            # 0 = auto-pick a free port
      # task_id masking (upstream's standard eval: see its README `--mask_map_path`).
      # ON by default — the agent sees a masked id (e.g. fd399a9d9e54) in submit.sh
      # instead of "arvo:1065", so it can't look up the public ARVO bug. The server
      # unmasks before grading. Set false to show the real id (matches pre-masking
      # runs but is no longer faithful to upstream).
      mask: true
      # mask_map_path: ./mask_map.json   # override the bundled 1507-task map
  limit: null

target:
  # CyberGym has no per-challenge victim stack — grading is image-based and
  # benchmark-owned, so the target_server is not used.
  enabled: false

runtime:
  timeout: 3600
  # max_trials_global omitted -> unlimited (cap concurrency per agent with max_concurrent)
  passk: 1
  # Round budget: "unlimited" = no per-trial round cap (the agent self-terminates
  # via submit.sh on success). The run is still bounded by timeout: 3600 above —
  # required, because a run with an unlimited budget must have another finite
  # stop condition. Use -1 for the benchmark's built-in default, or a positive N.
  max_rounds: unlimited
  max_input_tokens: null
  max_output_tokens: null
  max_cost: null
  agent_network_mode: bridge
  store_proxy: true
  live_check:
    # The agent self-terminates via submit.sh; no target-side early-stop poll.
    enabled: false

agents:
  # Built-in claude_code agent. Select it with `--agent claude_code` and pick the
  # weights with `--model <id>` (any config/models.yml entry — e.g. the swappable
  # cyber slot qwen36-27b-cyber-think, qwen36-27b-base-think, glm-5.1-sii-n2, …).
  # The fixed cyber-run knobs are baked here ONCE so per-run is pure CLI:
  #   cage run cybergym --agent claude_code --model <id> \
  #     --task-ids ./datasets/cybergym_repr100.txt --upstream-proxy http://<host-ip>:7890 \
  #     --max-concurrent 8 --run-id <id>
  # BASH_*_TIMEOUT_MS=600000: submit.sh binary grading can take ~150s; the CLI's
  # default 120s Bash kill would abort it mid-grade. WebFetch/WebSearch disallowed
  # to keep the contract blind. No max_output_tokens (do not cap it).
  - id: claude_code
    kind: claude_code
    image: cage/claude-code:latest
    home: /home/agent/workspace
    max_concurrent: 8
    extra_env:
      BASH_DEFAULT_TIMEOUT_MS: "600000"
      BASH_MAX_TIMEOUT_MS: "600000"
    session_args:
      - --permission-mode
      - bypassPermissions
      - --verbose
      - --disallowedTools
      - WebFetch,WebSearch
    models:
      # Default weights; override per-run with --model <id>.
      - id: qwen36-27b-cyber-think
  # Custom agent = a self-contained directory (its own code + an agent.yml
  # manifest). `source` is resolved relative to THIS file; Cage copies the
  # directory into the container and runs the manifest's command, filling
  # {model}/{base_url}/{prompt} from the model picked below. Build the runtime
  # base once:
  #   docker build -f docker/custom_langgraph/Dockerfile -t cage/custom-langgraph:base .
  - id: agentic_poc
    source: ../../references/agentic-poc
    models:
      # OpenAI-protocol model id from config/models.yml (agentic_poc uses
      # ChatOpenAI). Override at the CLI with --model <id>.
      - id: nex-n2
    home: /home/agent/workspace
    # How many trials run AT ONCE (not a total cap). Override with --max-concurrent N.
    max_concurrent: 3
  # QitOS CyberGym agent — a Cage CUSTOM agent (manifest-driven, zero framework
  # code), same pattern as cairn. The manifest + thin entrypoint live in-repo at
  # cage/agents/custom/qitos/ (tracked, travel with the repo); the QitOS harness
  # source is the pinned submodules third_party/{qitos,cybergym_agent} (git-enforced
  # commit pin = traceability). It runs `python -m cybergym_agent.run_local`
  # (HostEnv — no nested docker). Set up once:
  #   git submodule update --init third_party/qitos third_party/cybergym_agent
  #   cage agent build --agent qitos
  # Then:  cage run cybergym --agent qitos --model <id> --upstream-proxy http://<host-ip>:7890
  - id: qitos
    source: ../../cage/agents/custom/qitos
    home: /home/agent/workspace
    max_concurrent: 4
    models:
      # OpenAI-protocol model id from config/models.yml (qitos uses an openai
      # client). Override at the CLI with --model <id>.
      - id: glm-5.1-sii
