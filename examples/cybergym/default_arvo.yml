# Self-declared entry in the `cage benchmark list` registry. The framework
# discovers this block; it hardcodes no benchmark names.
registration:
  id: arvo
  display_name: ARVO (external)
  description: Same-kind ARVO reproduction tasks not in the CyberGym benchmark.
  order: 6
  samples:
    index: arvo.json

project:
  # Appears in run artifacts and the web inspector.
  name: cybergym-arvo-external

proxy:
  enabled: true
  request_timeout: 3600
  # upstream_http_proxy: http://172.17.0.1:7890

output:
  dashboard_prompt: false
  dashboard_output: false
  dashboard_reasoning: false
  csv_prompt: false
  csv_output: false
  csv_reasoning: false

logging:
  inspect_mode: auto

eval:
  benchmark:
    module: ./benchmark.py
    class: CyberGymBenchmark
    # Task catalog: same-kind ARVO tasks that are NOT part of the CyberGym
    # benchmark ("arvo-external", 3480 tasks). Built by globbing the payload
    # tree with scripts/build_cybergym_index.py from-data-dir.
    benchmark_root: ./datasets
    index_file: arvo.json
    # External payloads (repo-vul.tar.gz etc.) staged into the agent container.
    data_dir: ./datasets/payloads-arvo
    # --- Grading backend: BINARY mode is the default (matches default_cybergym) -
    # binary_dir set -> grade against the prebuilt vul/fix binaries extracted from
    # the n132/arvo image tars (scripts/extract_server_binaries.py), run by a small
    # pre-pulled cybergym/oss-fuzz-base-runner. Binaries exist only for the tasks
    # that have been extracted, so task_ids below pins the run to that ready set.
    binary_dir: ./datasets/server-binary-arvo
    # Only tasks whose vul+fix binaries AND payload are present (regenerate as the
    # extraction proceeds — see the recipe in any local arvo yaml). Omit to run the
    # full catalog (image mode only). Override per-run with --task-ids / --sample.
    task_ids: ./datasets/arvo_binary_ready.txt
    # To use IMAGE mode instead (per-task n132/arvo:<id>-<mode> images, full 3480
    # catalog), comment out binary_dir + task_ids above and uncomment these:
    # image_cache_dir: ./datasets/image-cache
    # level0 repo only · level1 +description · level2 +crash trace · level3 +patch.
    difficulty: level1
    # White-box debug toggles exactly as in cybergym: `--dynamic-sandbox true`
    # (or --set eval.benchmark.dynamic_sandbox=true) stages the prebuilt target +
    # uses the debug image. Subset further with `--sample arvo_10012 ...`.
    grading:
      enabled: true
    # IMAGE MODE ONLY (ignored while binary_dir is set above). Uncomment together
    # with image_cache_dir to grade the full 3480-task catalog against per-task
    # n132/arvo images with on-demand load + LRU eviction:
    # image_cache:
    #   pinned_task_ids: ./datasets/cybergym_images.txt   # never evicted
    #   max_evictable_gb: 500
    #   evict: true
    #   min_free_gb: 50      # storage-safety floor; offline resolution only
    #   preload: true        # warm a trial's image in the background at start
  limit: null

target:
  enabled: false

runtime:
  timeout: 3600
  # max_trials_global omitted -> unlimited (cap concurrency per agent with max_concurrent)
  passk: 1
  max_rounds: -1
  max_input_tokens: null
  max_output_tokens: null
  max_cost: null
  agent_network_mode: bridge
  store_proxy: true
  live_check:
    enabled: false

agents:
  - id: claude_code
    kind: claude_code
    models:
      - id: glm-5.1
        sources: [glm-5.1-w4a8, glm-5.1-w4a8-4maas]
        extra_env:
          CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS: "1"
          DISABLE_INTERLEAVED_THINKING: "1"
    image: pursu1ng/cage-images:claude-code-latest
    home: /home/agent/workspace
    # submit.sh blocks on synchronous host-side grading (~150s). Claude Code's
    # Bash tool would otherwise kill the curl at 120s; outwait the grading ceiling.
    extra_env:
      BASH_DEFAULT_TIMEOUT_MS: "600000"
      BASH_MAX_TIMEOUT_MS: "600000"
    # Concurrency: how many trials this agent runs AT ONCE (not a total cap).
    # Override at the CLI with --max-concurrent N.
    max_concurrent: 3
    session_args:
      - --permission-mode
      - bypassPermissions
      - --verbose
      # Align with the upstream CyberGym claude_code runner's "no web tools"
      # setting (examples/agents/claude_code/run.py: disallowed_tools =
      # "WebFetch,WebSearch"). The PoC must come from the agent's own analysis,
      # not from looking the CVE up on the web.
      - --disallowedTools
      - WebFetch,WebSearch
