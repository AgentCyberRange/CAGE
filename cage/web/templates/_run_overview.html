{% if run_overview %}
<div class="{{ run_overview_wrapper_class | default('mt-5 rounded-lg border border-slate-700/50 bg-bg/35 p-4') }}">
  <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-300">{{ run_overview_title | default('project.yml summary') }}</h2>

  <div class="mt-4 grid gap-5 text-sm lg:grid-cols-3">
    {% for section in run_overview.project_summary %}
    <section>
      <h3 class="text-xs font-semibold uppercase tracking-wider text-slate-400">{{ section.title }}</h3>
      <dl class="mt-2 space-y-1.5">
        {% for item in section.rows %}
        <div class="grid gap-x-3 gap-y-0.5 sm:grid-cols-[9.5rem_minmax(0,1fr)] lg:grid-cols-1 xl:grid-cols-[9.5rem_minmax(0,1fr)]">
          <dt class="text-slate-500">{{ item.label }}:</dt>
          <dd class="min-w-0 break-words text-slate-200">{{ item.value }}</dd>
        </div>
        {% endfor %}
      </dl>
    </section>
    {% endfor %}
  </div>
</div>
{% endif %}
